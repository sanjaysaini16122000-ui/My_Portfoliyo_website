{% extends 'base.html' %}

{% block title %}Contact | My Portfolio{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; flex-direction: column;">
    <h1>Contact Me</h1>
    <p style="margin-bottom: 30px; color: var(--text-secondary);">If you’d like to work with me, feel free to reach out.</p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>
</div>
{% endblock %}
